# docker-compose.yml
# ─────────────────────────────────────────────────────────────────────────────
# Diamond Wear — Application Angular servie par Nginx
#
# Usage dev  : docker compose up --build
# Usage prod : docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Application Angular (Nginx) ───────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: diamond_wear
    restart: unless-stopped
    ports:
      - "3002:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - diamond_net

# ── Réseau interne ──────────────────────────────────────────────────────────
networks:
  diamond_net:
    driver: bridge
