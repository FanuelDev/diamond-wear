# .github/workflows/deploy.yml
# ─────────────────────────────────────────────────────────────────────────────
# Déploiement automatique de Diamond Wear sur VPS via SSH
#
# Déclencheurs :
#   • Push sur main       → déploiement automatique
#   • workflow_dispatch   → déploiement manuel depuis l'onglet Actions
#
# Secrets GitHub à configurer (Settings → Secrets → Actions) :
#   VPS_HOST      — IP ou nom de domaine du VPS  (ex: 72.62.21.77)
#   VPS_USER      — Utilisateur SSH              (ex: root)
#   VPS_PASSWORD  — Mot de passe SSH
#   VPS_PORT      — Port SSH                     (optionnel, défaut: 22)
#
# Prérequis sur le VPS :
#   • Git cloné dans /root/diamond-wear
#   • Docker + Docker Compose installés
#   • Port 80 (ou APP_PORT) ouvert dans le firewall
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to VPS

on:
  push:
    branches: [main]

  # Déploiement manuel depuis l'onglet Actions de GitHub
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Forcer le rebuild complet (--no-cache)'
        type: boolean
        default: false

# Un nouveau push annule le déploiement précédent en attente
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Job 1 : Build & tests ─────────────────────────────────────────────────
  build:
    name: Build Angular
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: Build production
        run: npm run build

      - name: Résumé du build
        run: |
          echo "### ✅ Build réussi" >> $GITHUB_STEP_SUMMARY
          echo "| Info | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Déclenché par | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          BUILD_SIZE=$(du -sh dist/diamond-wear/browser 2>/dev/null | cut -f1 || echo "N/A")
          echo "| Taille du build | $BUILD_SIZE |" >> $GITHUB_STEP_SUMMARY

  # ── Job 2 : Déploiement VPS ───────────────────────────────────────────────
  deploy:
    name: Déployer sur le VPS
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Installer sshpass
        run: sudo apt-get install -y sshpass

      - name: Connexion SSH et déploiement
        env:
          VPS_HOST:     ${{ secrets.VPS_HOST }}
          VPS_USER:     ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_PORT:     ${{ secrets.VPS_PORT || '22' }}
          FORCE_DEPLOY: ${{ inputs.force_deploy || 'false' }}
        run: |
          sshpass -p "$VPS_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -p "$VPS_PORT" \
            "$VPS_USER@$VPS_HOST" << 'EOF'
            set -e

            APP_DIR="/root/diamond-wear"
            COMPOSE="docker compose -f $APP_DIR/docker-compose.yml"

            echo "────────────────────────────────────────────"
            echo " Diamond Wear — Déploiement"
            echo " Date   : $(date '+%Y-%m-%d %H:%M:%S')"
            echo " Commit : ${{ github.sha }}"
            echo "────────────────────────────────────────────"

            cd "$APP_DIR"

            echo "→ Pulling latest code..."
            git checkout -- .
            git pull origin main

            # Rebuild : --no-cache si déploiement forcé depuis workflow_dispatch
            BUILD_FLAGS=""
            if [ "${{ env.FORCE_DEPLOY }}" = "true" ]; then
              echo "→ Rebuild forcé (--no-cache)"
              BUILD_FLAGS="--no-cache"
            fi

            echo "→ Building image..."
            $COMPOSE build $BUILD_FLAGS app

            echo "→ Redémarrage du conteneur..."
            $COMPOSE up -d --remove-orphans app

            echo "→ État des conteneurs :"
            $COMPOSE ps

            echo "→ Nettoyage des images inutilisées..."
            docker image prune -f

            echo ""
            echo "✅ Déploiement terminé avec succès !"
          EOF

      - name: Résumé du déploiement
        if: success()
        run: |
          echo "### 🚀 Déploiement réussi" >> $GITHUB_STEP_SUMMARY
          echo "| Info | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Serveur | \`${{ secrets.VPS_HOST }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit déployé | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Rebuild forcé | ${{ inputs.force_deploy || 'false' }} |" >> $GITHUB_STEP_SUMMARY
