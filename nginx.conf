# nginx.conf
# Configuration Nginx pour Diamond Wear — Angular SPA

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Headers de sécurité ────────────────────────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"                              always;
    add_header X-Content-Type-Options  "nosniff"                                 always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"         always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # ── Compression gzip ───────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff2;
    gzip_min_length 1024;

    # ── Cache assets Angular (noms hashés, immutables) ─────────────────────────
    # Angular génère des noms du type main.abc123.js → cache 1 an
    location ~* \.(js|css|woff2?|ttf|eot|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Images et médias : cache 30 jours ─────────────────────────────────────
    location ~* \.(png|jpg|jpeg|gif|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── SPA fallback — toutes les routes → index.html ─────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
