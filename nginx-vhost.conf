# /etc/nginx/sites-available/diamondwear.a07.agency
# ─────────────────────────────────────────────────────────────────────────────
# Reverse proxy : diamondwear.a07.agency → conteneur Docker sur :3002
#
# Installation sur le VPS :
#   sudo cp nginx-vhost.conf /etc/nginx/sites-available/diamondwear.a07.agency
#   sudo ln -s /etc/nginx/sites-available/diamondwear.a07.agency \
#              /etc/nginx/sites-enabled/diamondwear.a07.agency
#   sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name diamondwear.a07.agency;

    # ── Logs spécifiques au domaine ────────────────────────────────────────────
    access_log /var/log/nginx/diamondwear.access.log;
    error_log  /var/log/nginx/diamondwear.error.log;

    # ── Reverse proxy vers le conteneur Docker ─────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffer
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 16k;
    }
}
